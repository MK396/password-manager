<h2>Dodaj nowe hasło</h2>
<form method="post" id="add-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Zapisz bezpiecznie</button>
</form>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script>
document.getElementById('add-form').onsubmit = function(e) {
    const key = sessionStorage.getItem('user_crypto_key');
    if (!key) {
        alert("Zaloguj sie ponownie");
        e.preventDefault();
        return;
    }

    const passInput = document.getElementById('id_password');
    const encrypted = CryptoJS.AES.encrypt(passInput.value, key).toString();
    passInput.value = encrypted;
};
</script>

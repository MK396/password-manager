<p>Witaj, {{ user.username }}! 
   <form action="{% url 'logout' %}" method="post">
       {% csrf_token %}
       <button type="submit">Wyloguj się</button>
   </form>
</p>
<hr>

<h1>Mój Menedżer Haseł</h1>
<a href="{% url 'add_password' %}">➕ Dodaj nowe hasło</a>
<ul>
    {% for entry in entries %}
        <li>
            <strong>{{ entry.website }}</strong> - 
            Login: {{ entry.username }} | 
            Hasło: <code>{{ entry.password }}</code>
        </li>
    {% endfor %}
</ul>
